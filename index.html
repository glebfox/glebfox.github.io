<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Gleb Gorelov's personal page">
  <meta name="author" content="Gleb Gorelov">

  <!-- Canonical URL: the page is reachable at both the apex domain and the github.io host; point crawlers at one. -->
  <link rel="canonical" href="https://glebfox.com/">

  <!--
    Social link previews. og:image / twitter:image must be ABSOLUTE URLs — scrapers
    (Slack, Telegram, Facebook, X) fetch them server-side, so a relative path won't resolve.
    The card is a single static PNG (images/og-image.png), intentionally dark and non-adaptive:
    a scraper has no color-scheme to honor, so it can't mirror the page's light/dark toggle.
  -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="glebfox.com">
  <meta property="og:url" content="https://glebfox.com/">
  <meta property="og:title" content="Gleb Gorelov">
  <meta property="og:description" content="Gleb Gorelov's personal page">
  <meta property="og:locale" content="en_US">
  <meta property="og:image" content="https://glebfox.com/images/og-image.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Gleb Gorelov — glebfox.com">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Gleb Gorelov">
  <meta name="twitter:description" content="Gleb Gorelov's personal page">
  <meta name="twitter:image" content="https://glebfox.com/images/og-image.png">
  <meta name="twitter:image:alt" content="Gleb Gorelov — glebfox.com">

  <!-- Declare supported color schemes early so the browser themes the canvas before CSS parses. -->
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#e9ebef">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#010309">

  <link rel="icon" href="images/favicon/favicon-light.svg" type="image/svg+xml" media="(prefers-color-scheme: light)">
  <link rel="icon" href="images/favicon/favicon-dark.svg" type="image/svg+xml" media="(prefers-color-scheme: dark)">

  <!-- Preload the display font used by the LCP heading so it arrives sooner (fonts fetch in CORS mode). -->
  <link rel="preload" href="fonts/Playlist-Script.ttf.woff" as="font" type="font/woff" crossorigin>

  <title>Gleb Gorelov</title>

  <style>
    @font-face {
      font-family: 'Playlist-Script';
      src: url('fonts/Playlist-Script.ttf.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    /*
     * Theming: a single set of variables resolved with light-dark(light, dark).
     * The active value follows the `color-scheme` property — `light dark` tracks
     * the OS preference, and the toggle overrides it to an explicit `light`/`dark`.
     */
    :root {
      color-scheme: light dark;

      --bg-from:   light-dark(oklch(94% 0.005 260), oklch(10% 0.02 260));
      --bg-to:     light-dark(oklch(86% 0.012 260), oklch(16% 0.04 260));
      --text:      light-dark(oklch(18% 0.01 260),  oklch(95% 0.01 260));
      --muted:     light-dark(oklch(46% 0.01 260),  oklch(62% 0.01 260));
      --btn-bg:    light-dark(oklch(0% 0 0 / 0.07), oklch(100% 0 0 / 0.10));
      --btn-hover: light-dark(oklch(0% 0 0 / 0.13), oklch(100% 0 0 / 0.18));
      --orb-1:     light-dark(oklch(75% 0.14 350),  oklch(42% 0.22 290));
      --orb-2:     light-dark(oklch(78% 0.12 220),  oklch(52% 0.18 195));
      --orb-3:     light-dark(oklch(76% 0.12 290),  oklch(38% 0.20 250));
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100%;
      padding: 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--bg-from), var(--bg-to));
      color: var(--text);
      /* Only `color` is animatable here — a gradient `background` can't transition, so it would no-op. */
      transition: color 0.3s;
    }

    /* ── Aurora orbs ──────────────────────────────────── */

    .orbs {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
      user-select: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      transition: background-color 0.5s;
    }

    .orb-1 {
      width: 50vmax;
      height: 50vmax;
      top: -15%;
      left: -10%;
      background-color: var(--orb-1);
      animation: drift-1 22s ease-in-out infinite;
    }

    .orb-2 {
      width: 40vmax;
      height: 40vmax;
      bottom: -10%;
      right: -10%;
      background-color: var(--orb-2);
      animation: drift-2 28s ease-in-out infinite;
    }

    .orb-3 {
      width: 35vmax;
      height: 35vmax;
      top: 20%;
      left: 40%;
      background-color: var(--orb-3);
      animation: drift-3 18s ease-in-out infinite;
    }

    @keyframes drift-1 {
      0%, 100% { transform: translate(0,    0  ); }
      33%       { transform: translate(6%,  10%); }
      66%       { transform: translate(-4%, 6% ); }
    }

    @keyframes drift-2 {
      0%, 100% { transform: translate(0,    0   ); }
      33%       { transform: translate(-8%, -6% ); }
      66%       { transform: translate(5%,  -10%); }
    }

    @keyframes drift-3 {
      0%, 100% { transform: translate(0,   0  ); }
      33%       { transform: translate(8%, 6% ); }
      66%       { transform: translate(-5%, 10%); }
    }

    /* ── Entrance animation ───────────────────────────── */

    @keyframes enter {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    header {
      animation: enter 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    main {
      animation: enter 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
    }

    footer {
      animation: enter 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }

    /* ── Header ───────────────────────────────────────── */

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    /* ── Theme toggle ─────────────────────────────────── */

    #theme-toggle {
      position: relative;
      width: 2.5rem;
      height: 2.5rem;
      border: none;
      border-radius: 50%;
      background: var(--btn-bg);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      backdrop-filter: blur(4px);
      outline: none;
    }

    #theme-toggle:hover {
      background: var(--btn-hover);
    }

    #theme-toggle:focus-visible {
      outline: 2px solid var(--muted);
      outline-offset: 2px;
    }

    /*
     * Both icons are always present; light-dark() reveals exactly one based on
     * the active color-scheme (sun in dark, moon in light). This keeps the icon
     * driven solely by color-scheme — mask-image itself can't use light-dark().
     */
    #theme-toggle::before,
    #theme-toggle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 1.1rem;
      height: 1.1rem;
      transform: translate(-50%, -50%);
      mask-repeat: no-repeat;
      mask-position: center;
      mask-size: contain;
    }

    /* sun icon (lucide) → shown in dark scheme */
    #theme-toggle::before {
      background-color: light-dark(transparent, currentColor);
      mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='12' cy='12' r='4'/%3E%3Cpath d='M12 2v2'/%3E%3Cpath d='M12 20v2'/%3E%3Cpath d='m4.93 4.93 1.41 1.41'/%3E%3Cpath d='m17.66 17.66 1.41 1.41'/%3E%3Cpath d='M2 12h2'/%3E%3Cpath d='M20 12h2'/%3E%3Cpath d='m6.34 17.66-1.41 1.41'/%3E%3Cpath d='m19.07 4.93-1.41 1.41'/%3E%3C/svg%3E");
    }

    /* moon icon (lucide) → shown in light scheme */
    #theme-toggle::after {
      background-color: light-dark(currentColor, transparent);
      mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z'/%3E%3C/svg%3E");
    }

    /* ── Main content ─────────────────────────────────── */

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      text-align: center;
    }

    h1 {
      font-family: 'Playlist-Script', cursive;
      /* Scale the fallback (cursive) to the web font's x-height so the swap doesn't shift layout. */
      font-size-adjust: from-font;
      /* The rem term keeps the heading responsive to the user's font-size/zoom, not viewport width alone. */
      font-size: clamp(4rem, 2rem + 9vw, 10rem);
      font-weight: normal;
      line-height: 1.1;
      padding-bottom: 0.2em;
      text-wrap: balance;
    }

    .tagline {
      font-size: clamp(0.875rem, 2vw, 1.125rem);
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-wrap: balance;
    }

    /* ── Footer ───────────────────────────────────────── */

    footer {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }

    footer a {
      color: inherit;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* ── Reduced motion ───────────────────────────────── */

    @media (prefers-reduced-motion: reduce) {
      .orb { animation: none; }
      header, main, footer { animation: none; }
    }

    /* ── Forced colors (Windows High Contrast) ────────── */

    @media (forced-colors: active) {
      #theme-toggle { border: 1px solid ButtonText; }
      #theme-toggle::before { background-color: light-dark(transparent, ButtonText); }
      #theme-toggle::after  { background-color: light-dark(ButtonText, transparent); }
    }
  </style>

  <script>
    // Apply a saved override before first paint to avoid a flash.
    // With no saved preference, CSS `color-scheme: light dark` follows the OS.
    (function () {
      var saved = localStorage.getItem('theme');
      if (saved === 'light' || saved === 'dark') {
        document.documentElement.style.colorScheme = saved;
      }
    })();
  </script>
</head>

<body>

  <div class="orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <header>
    <span class="brand">Gleb Gorelov</span>
    <button id="theme-toggle" aria-label="Toggle theme" title="Toggle theme"></button>
  </header>

  <main>
    <h1>Coming soon</h1>
    <p class="tagline">This site is under construction</p>
  </main>

  <footer>
    <p>Copyright &copy; 2016&ndash;<span id="year">2026</span> Gleb Gorelov. All rights reserved.</p>
  </footer>

  <script>
    // Footer year (kept current automatically; the markup carries a sane fallback for no-JS).
    document.getElementById('year').textContent = new Date().getFullYear();

    var root = document.documentElement;
    document.getElementById('theme-toggle').addEventListener('click', function () {
      var systemScheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      // Fall back to the OS preference when no explicit override is set yet.
      var current = root.style.colorScheme;
      if (current !== 'light' && current !== 'dark') current = systemScheme;
      var next = current === 'dark' ? 'light' : 'dark';
      if (next === systemScheme) {
        // Toggling back to the system scheme: drop the override so the page follows the OS again.
        root.style.colorScheme = '';
        localStorage.removeItem('theme');
      } else {
        root.style.colorScheme = next;
        localStorage.setItem('theme', next);
      }
    });
  </script>

</body>
</html>
