  <link rel="stylesheet" href="css/style.css">

  <script>
    // Apply theme before render to avoid flash
    (function () {
      var saved = localStorage.getItem('theme');
      var preferred = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', saved || preferred);
    })();
  </script>
</head>

<body>

  <div class="orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <header>
    <span class="brand">Gleb Gorelov</span>
    <button id="theme-toggle" aria-label="Toggle theme" title="Toggle theme"></button>
  </header>

  <main>
    <h1>Coming soon</h1>
    <p class="tagline">This site is under construction</p>
  </main>

  <footer>
    <p>Copyright &copy; 2016&ndash;<script>document.write(new Date().getFullYear())</script> Gleb Gorelov. All rights reserved.</p>
  </footer>

  <script>
    var html = document.documentElement;
    document.getElementById('theme-toggle').addEventListener('click', function () {
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>

</body>
</html>
